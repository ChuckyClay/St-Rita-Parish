<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daily Readings - St. Rita Parish</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>St. Rita Parish</h1>
    </div>
    <button id="menu-toggle" class="menu-toggle">☰</button>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="mass-sacraments.html">Mass & Sacraments</a>
      <a href="groups-ministries.html">Groups & Ministries</a>
      <a href="announcements-events.html">Announcements & Events</a>
      <a href="daily-readings.html" class="active">Daily Readings</a>
      <a href="contact.html">Contact</a>
      <a href="admin.html" target="_blank">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section>
      <h2>Daily Readings</h2>
      <div id="daily-readings-full"></div>
      <p>
        For the complete readings and audio, visit the
        <a href="#" id="source-link" target="_blank" rel="noopener noreferrer">
          official Catholic source
        </a>.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    &copy; 2025 St. Rita Parish <br>
    <i>Designed & Developed by DevTwins Developers</i>
  </footer>

  <script>
    const API_BASE = 'https://st-rita-parish.onrender.com';

    function formatKenyaDate() {
      const now = new Date();
      return now.toLocaleDateString('en-KE', {
        timeZone: 'Africa/Nairobi',
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function getUsccbTodayLink() {
      const now = new Date();
      const kenya = new Date(now.toLocaleString('en-US', { timeZone: 'Africa/Nairobi' }));
      const yyyy = kenya.getFullYear();
      const mm = String(kenya.getMonth() + 1).padStart(2, '0');
      const dd = String(kenya.getDate()).padStart(2, '0');

      return `https://bible.usccb.org/bible/readings/${mm}${dd}${yyyy}.cfm`;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadDailyReadingsFull() {
      const container = document.getElementById('daily-readings-full');
      const sourceLink = document.getElementById('source-link');

      container.innerHTML = '<div class="card"><p>Loading today’s readings...</p></div>';
      sourceLink.href = getUsccbTodayLink();

      try {
        const res = await fetch(`${API_BASE}/api/readings`);
        if (!res.ok) throw new Error('Failed to fetch readings');

        const readings = await res.json();

        if (Array.isArray(readings) && readings.length > 0) {
          container.innerHTML =
            `<p class="meta">${formatKenyaDate()}</p>` +
            readings.map(r => `
              <div class="card" style="margin-bottom:16px;">
                <h3>${escapeHtml(r.title)}</h3>
                <p style="white-space: pre-line;">${escapeHtml(r.content)}</p>
              </div>
            `).join('');
        } else {
          container.innerHTML = `
            <div class="card">
              <p>No readings available yet for today. Please check again later.</p>
            </div>
          `;
        }
      } catch (err) {
        container.innerHTML = `
          <div class="card">
            <p>Unable to load daily readings at the moment.</p>
          </div>
        `;
        console.error('Daily readings load error:', err);
      }
    }

    loadDailyReadingsFull();
  </script>
  <script src="app.js"></script>
</body>
</html>
