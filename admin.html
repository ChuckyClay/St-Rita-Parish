<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - St. Rita Parish</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>Admin Panel</h1>
    </div>
    <button id="logout-btn" class="admin-btn" style="display:none; position:absolute; top:20px; right:20px;">
      Logout
    </button>
  </header>

  <main class="container admin-panel">
    <section id="auth-section" class="card admin-card">
      <h2 class="admin-title">Admin Login</h2>
      <form id="admin-login-form" class="admin-form">
        <input type="hidden" id="admin-username" value="admin" />

        <label for="admin-password">Password:</label>
        <input type="password" id="admin-password" required />

        <button type="submit" class="admin-btn">Login</button>
      </form>
      <div id="auth-error" class="small muted" style="color:red; margin-top:10px;"></div>
    </section>

    <section id="admin-content" style="display:none; width:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
        <h2 style="margin:0;">Dashboard</h2>
        <button id="refresh-btn" class="admin-btn" style="padding:10px 18px;">Refresh Data</button>
      </div>

      <div class="admin-sections">
        <!-- Announcements -->
        <section class="card admin-card">
          <h3 class="admin-title">Announcements</h3>

          <form id="ann-form" class="admin-form">
            <input type="hidden" id="ann-id" />

            <label for="ann-title">Title</label>
            <input type="text" id="ann-title" value="Announcement" required />

            <label for="ann-text">Content</label>
            <textarea id="ann-text" rows="4" required></textarea>

            <button type="submit" class="admin-btn">Save Announcement</button>
            <button type="button" id="ann-cancel-edit" class="admin-btn" style="display:none; margin-top:8px;">
              Cancel Edit
            </button>

            <div id="ann-success" class="small muted" style="margin-top:10px;"></div>
          </form>

          <div class="admin-divider"></div>

          <label for="ann-search">Search Announcements</label>
          <input type="text" id="ann-search" placeholder="Search announcements..." />

          <ul id="ann-list" class="list" style="margin-top:10px;"></ul>
        </section>

        <!-- Events -->
        <section class="card admin-card">
          <h3 class="admin-title">Events</h3>

          <form id="event-form" class="admin-form">
            <input type="hidden" id="event-id" />

            <label for="event-title">Title</label>
            <input type="text" id="event-title" required />

            <label for="event-description">Description</label>
            <textarea id="event-description" rows="4" required></textarea>

            <label for="event-date">Date</label>
            <input type="date" id="event-date" required />

            <label for="event-time">Time</label>
            <input type="time" id="event-time" required />

            <button type="submit" class="admin-btn">Save Event</button>
            <button type="button" id="event-cancel-edit" class="admin-btn" style="display:none; margin-top:8px;">
              Cancel Edit
            </button>

            <div id="event-success" class="small muted" style="margin-top:10px;"></div>
          </form>

          <div class="admin-divider"></div>

          <label for="event-search">Search Events</label>
          <input type="text" id="event-search" placeholder="Search events..." />

          <ul id="event-list" class="list" style="margin-top:10px;"></ul>
        </section>

        <!-- Send Message -->
        <section class="card admin-card">
          <h3 class="admin-title">Send Message</h3>

          <form id="mess-form" class="admin-form">
            <label for="mess-text">Message</label>
            <textarea id="mess-text" rows="5" required></textarea>

            <button type="submit" class="admin-btn">Send Message</button>

            <div id="mess-success" class="small muted" style="margin-top:10px;"></div>
            <div id="sms-status" class="small muted" style="margin-top:6px;"></div>
          </form>
        </section>

        <!-- Phone List -->
        <section class="card admin-card">
          <h3 class="admin-title">Subscribed Phone Numbers</h3>
          <ul id="phone-list" class="list"></ul>
        </section>

        <!-- Fetch Readings -->
        <section class="card admin-card">
          <h3 class="admin-title">Daily Readings</h3>
          <p>Click the button below to manually fetch and store today's readings.</p>
          <button id="fetch-readings-btn" class="admin-btn">Fetch Readings Now</button>
          <div id="fetch-readings-status" class="small muted" style="margin-top:10px;"></div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'https://st-rita-parish.onrender.com';

    const authSection = document.getElementById('auth-section');
    const adminContent = document.getElementById('admin-content');
    const logoutBtn = document.getElementById('logout-btn');
    const refreshBtn = document.getElementById('refresh-btn');

    let announcements = [];
    let events = [];
    let editingAnnId = null;
    let editingEventId = null;

    function getToken() {
      return localStorage.getItem('jwtToken') || '';
    }

    function setMessage(id, text, color = '') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.style.color = color;
    }

    function showLogin() {
      authSection.style.display = '';
      adminContent.style.display = 'none';
      logoutBtn.style.display = 'none';
    }

    function showAdmin() {
      authSection.style.display = 'none';
      adminContent.style.display = 'block';
      logoutBtn.style.display = 'inline-block';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function apiFetch(path, options = {}, requiresAuth = false) {
      const headers = {
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };

      if (requiresAuth) {
        headers['Authorization'] = 'Bearer ' + getToken();
      }

      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers
      });

      let data = null;
      const contentType = response.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        data = await response.json();
      } else {
        data = await response.text();
      }

      if (response.status === 401) {
        localStorage.removeItem('jwtToken');
        showLogin();
        throw new Error('Session expired. Please log in again.');
      }

      if (!response.ok) {
        throw new Error(data?.error || data?.message || 'Request failed.');
      }

      return data;
    }

    // LOGIN
    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      setMessage('auth-error', '', '');

      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;

      try {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });

        localStorage.setItem('jwtToken', data.token);
        document.getElementById('admin-password').value = '';
        showAdmin();
        await loadAllAdminData();
      } catch (err) {
        setMessage('auth-error', err.message, 'red');
      }
    });

    logoutBtn.addEventListener('click', function() {
      localStorage.removeItem('jwtToken');
      showLogin();
    });

    refreshBtn.addEventListener('click', async function() {
      try {
        await loadAllAdminData();
      } catch (err) {
        alert(err.message);
      }
    });

    // ANNOUNCEMENTS
    async function loadAnnouncements() {
      const annList = document.getElementById('ann-list');
      annList.innerHTML = '<li>Loading...</li>';

      try {
        announcements = await apiFetch('/api/announcements');
        renderAnnouncements();
      } catch (err) {
        annList.innerHTML = `<li>${escapeHtml(err.message)}</li>`;
      }
    }

    function renderAnnouncements() {
      const annList = document.getElementById('ann-list');
      const q = document.getElementById('ann-search').value.trim().toLowerCase();

      const filtered = announcements.filter(a => {
        const title = (a.title || '').toLowerCase();
        const content = (a.content || '').toLowerCase();
        return title.includes(q) || content.includes(q);
      });

      if (!filtered.length) {
        annList.innerHTML = '<li>No announcements found.</li>';
        return;
      }

      annList.innerHTML = filtered.map(a => `
        <li>
          <b>${escapeHtml(a.title || 'Announcement')}</b><br>
          <span class="small muted">${a.date ? new Date(a.date).toLocaleString() : ''}</span>
          <p>${escapeHtml(a.content || '')}</p>
          <button class="admin-btn" style="margin-right:6px; padding:8px 14px;" onclick="editAnnouncement(${a.id})">Edit</button>
          <button class="admin-btn" style="padding:8px 14px;" onclick="deleteAnnouncement(${a.id})">Delete</button>
        </li>
      `).join('');
    }

    document.getElementById('ann-search').addEventListener('input', renderAnnouncements);

    document.getElementById('ann-cancel-edit').addEventListener('click', function() {
      editingAnnId = null;
      document.getElementById('ann-form').reset();
      document.getElementById('ann-title').value = 'Announcement';
      document.getElementById('ann-cancel-edit').style.display = 'none';
      setMessage('ann-success', '', '');
    });

    document.getElementById('ann-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const title = document.getElementById('ann-title').value.trim();
      const content = document.getElementById('ann-text').value.trim();

      if (!title || !content) {
        setMessage('ann-success', 'Title and content are required.', 'red');
        return;
      }

      try {
        if (editingAnnId) {
          await apiFetch(`/api/announcements/${editingAnnId}`, {
            method: 'PUT',
            body: JSON.stringify({
              title,
              content,
              date: new Date().toISOString()
            })
          }, true);
        } else {
          await apiFetch('/api/announcements', {
            method: 'POST',
            body: JSON.stringify({
              title,
              content,
              date: new Date().toISOString()
            })
          }, true);
        }

        editingAnnId = null;
        document.getElementById('ann-form').reset();
        document.getElementById('ann-title').value = 'Announcement';
        document.getElementById('ann-cancel-edit').style.display = 'none';
        setMessage('ann-success', 'Announcement saved.', 'green');
        await loadAnnouncements();
      } catch (err) {
        setMessage('ann-success', err.message, 'red');
      }
    });

    window.editAnnouncement = function(id) {
      const a = announcements.find(item => item.id === id);
      if (!a) return;

      editingAnnId = id;
      document.getElementById('ann-id').value = a.id;
      document.getElementById('ann-title').value = a.title || 'Announcement';
      document.getElementById('ann-text').value = a.content || '';
      document.getElementById('ann-cancel-edit').style.display = 'inline-block';
      setMessage('ann-success', 'Editing announcement.', 'green');
    };

    window.deleteAnnouncement = async function(id) {
      if (!confirm('Delete this announcement?')) return;

      try {
        await apiFetch(`/api/announcements/${id}`, {
          method: 'DELETE'
        }, true);
        await loadAnnouncements();
      } catch (err) {
        alert(err.message);
      }
    };

    // EVENTS
    async function loadEvents() {
      const eventList = document.getElementById('event-list');
      eventList.innerHTML = '<li>Loading...</li>';

      try {
        events = await apiFetch('/api/events');
        renderEvents();
      } catch (err) {
        eventList.innerHTML = `<li>${escapeHtml(err.message)}</li>`;
      }
    }

    function renderEvents() {
      const eventList = document.getElementById('event-list');
      const q = document.getElementById('event-search').value.trim().toLowerCase();

      const filtered = events.filter(e => {
        const title = (e.title || '').toLowerCase();
        const description = (e.description || '').toLowerCase();
        return title.includes(q) || description.includes(q);
      });

      if (!filtered.length) {
        eventList.innerHTML = '<li>No events found.</li>';
        return;
      }

      eventList.innerHTML = filtered.map(e => `
        <li>
          <b>${escapeHtml(e.title || '')}</b><br>
          <span class="small muted">${escapeHtml(e.date || '')} ${escapeHtml(e.time || '')}</span>
          <p>${escapeHtml(e.description || '')}</p>
          <button class="admin-btn" style="margin-right:6px; padding:8px 14px;" onclick="editEvent(${e.id})">Edit</button>
          <button class="admin-btn" style="padding:8px 14px;" onclick="deleteEvent(${e.id})">Delete</button>
        </li>
      `).join('');
    }

    document.getElementById('event-search').addEventListener('input', renderEvents);

    document.getElementById('event-cancel-edit').addEventListener('click', function() {
      editingEventId = null;
      document.getElementById('event-form').reset();
      document.getElementById('event-cancel-edit').style.display = 'none';
      setMessage('event-success', '', '');
    });

    document.getElementById('event-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const title = document.getElementById('event-title').value.trim();
      const description = document.getElementById('event-description').value.trim();
      const date = document.getElementById('event-date').value;
      const time = document.getElementById('event-time').value;

      if (!title || !description || !date || !time) {
        setMessage('event-success', 'All event fields are required.', 'red');
        return;
      }

      try {
        if (editingEventId) {
          await apiFetch(`/api/events/${editingEventId}`, {
            method: 'PUT',
            body: JSON.stringify({ title, description, date, time })
          }, true);
        } else {
          await apiFetch('/api/events', {
            method: 'POST',
            body: JSON.stringify({ title, description, date, time })
          }, true);
        }

        editingEventId = null;
        document.getElementById('event-form').reset();
        document.getElementById('event-cancel-edit').style.display = 'none';
        setMessage('event-success', 'Event saved.', 'green');
        await loadEvents();
      } catch (err) {
        setMessage('event-success', err.message, 'red');
      }
    });

    window.editEvent = function(id) {
      const e = events.find(item => item.id === id);
      if (!e) return;

      editingEventId = id;
      document.getElementById('event-id').value = e.id;
      document.getElementById('event-title').value = e.title || '';
      document.getElementById('event-description').value = e.description || '';
      document.getElementById('event-date').value = e.date || '';
      document.getElementById('event-time').value = e.time || '';
      document.getElementById('event-cancel-edit').style.display = 'inline-block';
      setMessage('event-success', 'Editing event.', 'green');
    };

    window.deleteEvent = async function(id) {
      if (!confirm('Delete this event?')) return;

      try {
        await apiFetch(`/api/events/${id}`, {
          method: 'DELETE'
        }, true);
        await loadEvents();
      } catch (err) {
        alert(err.message);
      }
    };

    // MESSAGES
    document.getElementById('mess-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const message = document.getElementById('mess-text').value.trim();
      if (!message) {
        setMessage('mess-success', 'Enter a message to send.', 'red');
        return;
      }

      setMessage('sms-status', 'Attempting to send...', 'green');

      try {
        await apiFetch('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ message })
        }, true);

        document.getElementById('mess-form').reset();
        setMessage('mess-success', 'Message sent.', 'green');
        setMessage('sms-status', 'Message sent to subscribers.', 'green');
      } catch (err) {
        setMessage('mess-success', err.message, 'red');
        setMessage('sms-status', 'SMS failed: ' + err.message, 'red');
      }
    });

    // PHONES
    async function renderPhoneList() {
      const phoneList = document.getElementById('phone-list');
      phoneList.innerHTML = '<li>Loading...</li>';

      try {
        const phones = await apiFetch('/api/phones', {}, true);

        if (!Array.isArray(phones) || !phones.length) {
          phoneList.innerHTML = '<li>No numbers subscribed.</li>';
          return;
        }

        phoneList.innerHTML = phones.map(p => `
          <li>${escapeHtml(p.phone || '')}</li>
        `).join('');
      } catch (err) {
        phoneList.innerHTML = `<li>${escapeHtml(err.message)}</li>`;
      }
    }

    // FETCH READINGS
    document.getElementById('fetch-readings-btn').addEventListener('click', async function() {
      setMessage('fetch-readings-status', 'Fetching readings...', 'green');

      try {
        const data = await apiFetch('/api/fetch-readings', {
          method: 'POST'
        }, true);

        setMessage('fetch-readings-status', data.message || 'Readings fetched.', 'green');
      } catch (err) {
        setMessage('fetch-readings-status', err.message, 'red');
      }
    });

    async function loadAllAdminData() {
      await Promise.all([
        loadAnnouncements(),
        loadEvents(),
        renderPhoneList()
      ]);
    }

    // INITIAL STATE
    if (getToken()) {
      showAdmin();
      loadAllAdminData().catch(() => {
        localStorage.removeItem('jwtToken');
        showLogin();
      });
    } else {
      showLogin();
    }
  </script>
</body>
</html>
